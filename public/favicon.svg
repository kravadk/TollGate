<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <radialGradient id="bg" cx="50%" cy="55%" r="65%">
      <stop offset="0%" stop-color="#2d1200"/>
      <stop offset="100%" stop-color="#080400"/>
    </radialGradient>
    <linearGradient id="arr" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ffaa00"/>
      <stop offset="100%" stop-color="#ff5200"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>
  <polygon points="7,26 50,18 58,28 50,34 7,38" fill="url(#arr)" filter="url(#glow)"/>
  <polygon points="13,40 52,35 58,42 52,48 13,48" fill="url(#arr)" filter="url(#glow)"/>
</svg>
